<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Document</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body>

    <div class="hero">
        <div class="form-box">
            <div class="button-box">
                <div id="btn"></div>
                <button type="button" class="toggle-btn" onclick="login()">Log in</button>
                  <button type="button" class="toggle-btn" onclick="signup()">Sign up</button>
            </div>
            <div class="social-icons">
            <img src="fb.png" alt="">
            <img src="tw.png" alt="">
            <img src="gp.png" alt="">
        </div>
        <form id="login" class="input-group">
            <!-- log in -->
            <input type="text" class="input-field"
            placeholder="User Id" required>
            <input type="text" class="input-field"
            placeholder="Enter Password" required>
            <input type="checkbox" id="checkbox" class="checkbox"><label for="checkbox">Remember Your Password</label>
            <button type="submit" class="submit-btn">Log in</button>
        </form>

            <!-- sign up -->
             <form id="signup" class="input-group">
                 <input type="email" class="input-field"
                 placeholder="Email" required>
                 <input type="text" class="input-field"
                 placeholder="User Id" required>
                 <input type="text" class="input-field"
                 placeholder="Enter Password" required>
                 <input type="checkbox" id="checkbox" class="checkbox"><label for="checkbox">Agree to the <a href="#">Terms & Conditions </a></label>
                 <button type="submit" class="submit-btn">Sign Up</button>
                </form>

        </div>
        
    </div>

    <script>
        var x = document.getElementById("login")
        var y = document.getElementById("signup")
        var z = document.getElementById("btn")

        function signup() {
            x.style.left = "-400px"
            y.style.left = "0px"
            z.style.left = "100px"
        }

         function login() {
            x.style.left = "0px"
            y.style.left = "450px"
            z.style.left = "0px"
        }

    </script>
</body>

</html>
